<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Claire Observability{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" />
  <link rel="stylesheet" href="/static/styles.css" />
  {% block head %}{% endblock %}
</head>
<body>
<div class="app-shell">

  <!-- ── Topbar ──────────────────────────────────────────────────────── -->
  <header class="topbar">
    <a class="brand" href="/dashboard">
      <span class="brand-dot"></span>
      Claire<span>.</span>observability
    </a>
    <div class="topbar-right">
      <div class="status-pill">
        <span class="led"></span>
        <span id="ws-status">Système actif</span>
      </div>
      <a class="btn btn-secondary btn-sm" href="/dashboard">Dashboard</a>
    </div>
  </header>

  <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-section">Observabilité</div>
    <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>

    <div class="sidebar-section">Agents</div>
    <a class="nav-link {% if request.url.path == '/agents' %}active{% endif %}" href="/agents">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/><path d="M6 20v-1a6 6 0 0 1 12 0v1"/>
        <circle cx="19" cy="8" r="3" fill="currentColor" opacity=".3"/>
      </svg>
      Agents Pixel
      <span class="nav-badge badge-green" id="sidebar-running">—</span>
    </a>

    <div class="sidebar-section">Intégrations</div>
    <a class="nav-link {% if request.url.path == '/integrations' %}active{% endif %}" href="/integrations">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      Hub Intégrations
    </a>

    <div class="sidebar-section">API</div>
    <a class="nav-link" href="/docs" target="_blank">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/>
      </svg>
      Docs API
    </a>
    <a class="nav-link" href="/prometheus" target="_blank">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Prometheus
    </a>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────────────── -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modal overlay (shared) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script src="/static/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
